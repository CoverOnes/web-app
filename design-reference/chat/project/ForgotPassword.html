<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>ChatOwl — 忘記密碼</title>
<meta name="viewport" content="width=1440,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#060A14; --bg-2:#0B1220; --bg-3:#0F172A; --line:rgba(148,163,184,.12); --line-strong:rgba(148,163,184,.2); --text:#E5E7EB; --text-dim:#94A3B8; --text-muted:#64748B; --accent:#6366F1; --accent-2:#8B5CF6; --cyan:#22D3EE; --green:#10B981; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; background:#000; color:var(--text); font-family:'Inter','Noto Sans TC',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
  button { cursor:pointer; border:none; background:none; color:inherit; font:inherit; }
  input { font:inherit; color:inherit; outline:none; border:none; background:none; }
  a { color:inherit; text-decoration:none; }

  .page { width:1440px; min-height:1024px; background: radial-gradient(1100px 700px at 50% 30%, rgba(99,102,241,.18), transparent 60%), radial-gradient(900px 600px at 50% 100%, rgba(34,211,238,.08), transparent 60%), var(--bg); position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 0; }
  .page::before { content:""; position:absolute; inset:0; background-image: linear-gradient(rgba(148,163,184,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.04) 1px, transparent 1px); background-size:64px 64px; mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%); pointer-events:none; }

  .topnav { position:absolute; top:30px; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 56px; z-index:5; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .mark { width:36px; height:36px; border-radius:10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display:flex; align-items:center; justify-content:center; box-shadow: 0 6px 24px rgba(99,102,241,.4); }
  .brand .name { font-size:18px; font-weight:800; letter-spacing:-.02em; }
  .brand .sub { font-size:11px; color:var(--text-dim); }
  .topnav .links { display:flex; gap:8px; }
  .topnav .links a { padding:8px 14px; border-radius:8px; font-size:13px; color:var(--text-dim); }
  .topnav .links a:hover { background:rgba(255,255,255,.04); color:var(--text); }

  .stack { width:100%; max-width:480px; position:relative; z-index:2; }

  /* Stepper */
  .stepper { display:flex; align-items:center; gap:8px; margin-bottom:32px; justify-content:center; }
  .step-dot { display:flex; align-items:center; gap:8px; }
  .step-dot .num { width:30px; height:30px; border-radius:999px; background:var(--bg-3); border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text-dim); transition:all 200ms; }
  .step-dot.active .num { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color:transparent; color:#fff; box-shadow: 0 0 0 5px rgba(99,102,241,.18); }
  .step-dot.done .num { background:rgba(16,185,129,.18); border-color:var(--green); color:var(--green); }
  .step-dot .lbl { font-size:11.5px; color:var(--text-muted); display:none; }
  .step-dot.active .lbl, .step-dot.done .lbl { color:var(--text-dim); }
  .step-line { flex:1; height:2px; background:var(--line); border-radius:1px; min-width:48px; max-width:80px; }
  .step-line.done { background: linear-gradient(90deg, var(--green), var(--accent)); }

  .card { background: rgba(15,23,42,.65); backdrop-filter: blur(18px); border:1px solid var(--line-strong); border-radius:18px; padding:40px 44px; box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04) inset; }

  .ico-big { width:64px; height:64px; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; }
  .ico-big.purple { background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.12)); border:1px solid rgba(139,92,246,.4); }
  .ico-big.cyan { background: linear-gradient(135deg, rgba(34,211,238,.18), rgba(99,102,241,.1)); border:1px solid rgba(34,211,238,.4); }
  .ico-big.green { background: linear-gradient(135deg, rgba(16,185,129,.2), rgba(34,211,238,.1)); border:1px solid rgba(16,185,129,.4); }

  h1 { font-size:26px; font-weight:700; letter-spacing:-.02em; margin:0 0 8px; text-align:center; }
  .lead { font-size:13.5px; color:var(--text-dim); line-height:1.6; text-align:center; margin:0 0 26px; }
  .lead b { color:var(--text); }

  .field { margin-bottom:14px; }
  .field label { display:block; font-size:12px; font-weight:600; margin-bottom:7px; color:var(--text); }
  .input-w { display:flex; align-items:center; gap:10px; padding:12px 14px; background: var(--bg-3); border:1px solid var(--line-strong); border-radius:10px; transition: all 150ms; }
  .input-w:focus-within { border-color:var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,.15); }
  .input-w svg { color:var(--text-muted); flex-shrink:0; }
  .input-w input { flex:1; font-size:14px; }
  .input-w input::placeholder { color:var(--text-muted); }

  .btn { width:100%; padding:13px; border-radius:10px; font-size:14px; font-weight:600; transition: all 150ms; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; box-shadow: 0 8px 26px rgba(99,102,241,.35); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(99,102,241,.45); }
  .btn-ghost { background:transparent; border:1px solid var(--line-strong); color:var(--text-dim); }
  .btn-ghost:hover { background:rgba(255,255,255,.04); color:var(--text); }

  .back { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:18px; font-size:13px; color:var(--text-dim); }
  .back a { color:#A78BFA; font-weight:600; }
  .back a:hover { color:#C7D2FE; }

  /* Step 2: code input */
  .otp { display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; margin:6px 0 18px; }
  .otp .digit { aspect-ratio:1; background:var(--bg-3); border:1.5px solid var(--line-strong); border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; font-family:'Inter',monospace; color:var(--text); }
  .otp .digit.f { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,.15); background: rgba(99,102,241,.08); }
  .otp .digit.empty { color: var(--text-muted); font-weight:400; }
  .resend-row { display:flex; align-items:center; justify-content:space-between; font-size:12.5px; color:var(--text-dim); padding:10px 14px; background: rgba(15,23,42,.5); border:1px solid var(--line); border-radius:9px; margin-bottom:8px; }
  .resend-row a { color:#A78BFA; font-weight:600; }
  .countdown { color:var(--cyan); font-weight:600; font-feature-settings:"tnum"; }

  /* Step 3: new password */
  .strength { margin-top:8px; padding:10px 12px; background:rgba(15,23,42,.4); border:1px solid var(--line); border-radius:8px; }
  .strength .bar { height:6px; background:var(--bg-3); border-radius:3px; overflow:hidden; margin-bottom:8px; display:flex; gap:3px; }
  .strength .bar div { flex:1; background:var(--bg-3); border-radius:2px; }
  .strength .bar div.on { background:linear-gradient(90deg, var(--green), var(--cyan)); }
  .strength .bar div.med { background: var(--amber, #F59E0B); }
  .strength .lvl { font-size:11.5px; color:var(--green); font-weight:600; margin-bottom:6px; }
  .check-list { display:grid; grid-template-columns: 1fr 1fr; gap:4px 14px; }
  .check { font-size:11.5px; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
  .check.ok { color:var(--green); }
  .check.ok::before { content:"✓"; font-weight:700; }
  .check::before { content:"○"; }

  /* Step 4: success */
  .success-list { background:rgba(16,185,129,.06); border:1px solid rgba(16,185,129,.3); border-radius:11px; padding:14px 16px; margin:18px 0; font-size:12.5px; color:var(--text-dim); display:flex; flex-direction:column; gap:8px; }
  .success-list .row { display:flex; gap:8px; align-items:center; }
  .success-list .ico { width:18px; height:18px; border-radius:999px; background:rgba(16,185,129,.2); color:var(--green); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }

  /* Side-by-side panels (3 step illustration) */
  .panels { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:18px; max-width:1280px; margin-bottom:28px; }
  .panel { background:rgba(15,23,42,.5); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:14px; padding:18px 18px 16px; opacity:.55; transform:scale(.96); transition:all 250ms; }
  .panel.active { opacity:1; transform:scale(1); border-color:rgba(99,102,241,.4); box-shadow: 0 12px 40px rgba(99,102,241,.18); }
  .panel.done { opacity:.85; }
  .panel .pn { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .panel .pn .b { width:22px; height:22px; border-radius:6px; background:var(--bg-3); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:var(--text-dim); }
  .panel.active .pn .b { background:linear-gradient(135deg,var(--accent),var(--accent-2)); border-color:transparent; color:#fff; }
  .panel.done .pn .b { background:rgba(16,185,129,.2); border-color:var(--green); color:var(--green); }
  .panel .pn .t { font-size:12px; font-weight:600; }
  .panel .pd { font-size:11px; color:var(--text-muted); line-height:1.55; }

  .footer { position:absolute; bottom:30px; left:0; right:0; display:flex; justify-content:center; gap:18px; font-size:11.5px; color:var(--text-muted); z-index:2; }
  .footer a { color:var(--text-muted); }
  .footer a:hover { color:var(--text-dim); }
</style>
</head>
<body>
<div class="page">

  <!-- top nav -->
  <div class="topnav">
    <div class="brand">
      <div class="mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="10" r="2.4" fill="#fff"/>
        <circle cx="15" cy="10" r="2.4" fill="#fff"/>
        <circle cx="9" cy="10" r="1" fill="#0B1220"/>
        <circle cx="15" cy="10" r="1" fill="#0B1220"/>
        <path d="M11 14.5 L12 16 L13 14.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg></div>
      <div>
        <div class="name">ChatOwl</div>
        <div class="sub">B2B 接案媒合</div>
      </div>
    </div>
    <div class="links">
      <a href="Help.html">需要協助？</a>
      <a href="Login.html" style="color:#A78BFA; font-weight:600;">登入 →</a>
    </div>
  </div>

  <div class="stack">

    <!-- 3-panel storyboard -->
    <div class="panels">
      <div class="panel done">
        <div class="pn"><div class="b"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="t">輸入 Email</div></div>
        <div class="pd">確認您的企業信箱以發送驗證碼</div>
      </div>
      <div class="panel active">
        <div class="pn"><div class="b">2</div><div class="t">輸入驗證碼</div></div>
        <div class="pd">輸入信件中的 6 位數驗證碼</div>
      </div>
      <div class="panel">
        <div class="pn"><div class="b">3</div><div class="t">設定新密碼</div></div>
        <div class="pd">建立安全的新密碼</div>
      </div>
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step-dot done"><div class="num"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
      <div class="step-line done"></div>
      <div class="step-dot active"><div class="num">2</div></div>
      <div class="step-line"></div>
      <div class="step-dot"><div class="num">3</div></div>
    </div>

    <!-- Card: Step 2 (verify code) shown by default -->
    <div class="card">
      <div class="ico-big cyan">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#67E8F9" stroke-width="2">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m3 7 9 7 9-7"/>
        </svg>
      </div>
      <h1>檢查您的信箱</h1>
      <p class="lead">我們已將 6 位數驗證碼寄送到<br><b>chen@singularity.tw</b></p>

      <div class="otp">
        <div class="digit f">3</div>
        <div class="digit f">9</div>
        <div class="digit f">4</div>
        <div class="digit f" style="border-color:var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,.15); background:rgba(99,102,241,.12);">|</div>
        <div class="digit empty">—</div>
        <div class="digit empty">—</div>
      </div>

      <div class="resend-row">
        <span>沒收到信？</span>
        <span><span class="countdown">00:42</span> 後可重新發送</span>
      </div>

      <button class="btn btn-primary">驗證並繼續 →</button>

      <div class="back">
        <a href="Login.html">← 返回登入</a>
      </div>
    </div>

  </div>

  <div class="footer">
    <a href="#">服務條款</a>
    <a href="#">隱私政策</a>
    <a href="#">資安公告</a>
    <span>© 2026 ChatOwl Inc.</span>
  </div>

</div>
</body>
</html>
