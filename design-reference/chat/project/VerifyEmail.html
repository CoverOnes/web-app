<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>ChatOwl — 啟用您的帳號</title>
<meta name="viewport" content="width=1440,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#060A14; --bg-2:#0B1220; --bg-3:#0F172A; --line:rgba(148,163,184,.12); --line-strong:rgba(148,163,184,.2); --text:#E5E7EB; --text-dim:#94A3B8; --text-muted:#64748B; --accent:#6366F1; --accent-2:#8B5CF6; --cyan:#22D3EE; --green:#10B981; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; background:#000; color:var(--text); font-family:'Inter','Noto Sans TC',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
  button { cursor:pointer; border:none; background:none; color:inherit; font:inherit; }
  a { color:inherit; text-decoration:none; }

  .page { width:1440px; min-height:1024px; background: radial-gradient(1100px 700px at 50% 30%, rgba(99,102,241,.18), transparent 60%), radial-gradient(900px 600px at 50% 100%, rgba(34,211,238,.08), transparent 60%), var(--bg); position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; padding:60px 0; }
  .page::before { content:""; position:absolute; inset:0; background-image: linear-gradient(rgba(148,163,184,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.04) 1px, transparent 1px); background-size:64px 64px; mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%); pointer-events:none; }

  .topnav { position:absolute; top:30px; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 56px; z-index:5; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .mark { width:36px; height:36px; border-radius:10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display:flex; align-items:center; justify-content:center; box-shadow: 0 6px 24px rgba(99,102,241,.4); }
  .brand .name { font-size:18px; font-weight:800; letter-spacing:-.02em; }
  .brand .sub { font-size:11px; color:var(--text-dim); }
  .topnav .help { font-size:13px; color:var(--text-dim); }

  .stack { width:100%; max-width:520px; position:relative; z-index:2; text-align:center; }

  /* Animated email illustration */
  .illust { position:relative; width:200px; height:200px; margin:0 auto 28px; }
  .illust .ring { position:absolute; inset:0; border-radius:50%; border:1.5px dashed rgba(99,102,241,.3); animation: spin 30s linear infinite; }
  .illust .ring2 { position:absolute; inset:18px; border-radius:50%; border:1px dashed rgba(34,211,238,.25); animation: spin 25s linear infinite reverse; }
  .illust .center { position:absolute; inset:36px; border-radius:50%; background: radial-gradient(circle, rgba(99,102,241,.25), rgba(99,102,241,.05)); display:flex; align-items:center; justify-content:center; }
  .illust .env { width:78px; height:78px; border-radius:14px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display:flex; align-items:center; justify-content:center; box-shadow: 0 18px 50px rgba(99,102,241,.4); position:relative; }
  .illust .env::after { content:""; position:absolute; top:-6px; right:-6px; width:24px; height:24px; border-radius:50%; background:var(--green); border:3px solid var(--bg); display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 4px rgba(16,185,129,.18); }
  .illust .check { position:absolute; top:-2px; right:-2px; z-index:3; }
  .illust .pulse { position:absolute; inset:24px; border-radius:50%; background:radial-gradient(circle, rgba(99,102,241,.18), transparent 70%); animation: pulse 2.4s ease-out infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0% { transform:scale(.85); opacity:.8; } 100% { transform:scale(1.4); opacity:0; } }

  /* Floating particles */
  .particle { position:absolute; width:6px; height:6px; border-radius:999px; background:var(--cyan); opacity:.7; box-shadow:0 0 8px var(--cyan); }
  .p1 { top:14%; left:18%; }
  .p2 { top:78%; left:22%; background:var(--accent-2); box-shadow:0 0 8px var(--accent-2); }
  .p3 { top:24%; right:12%; background:#F9A8D4; box-shadow:0 0 8px #F9A8D4; }
  .p4 { top:80%; right:18%; }

  .card { background:rgba(15,23,42,.7); backdrop-filter:blur(18px); border:1px solid var(--line-strong); border-radius:18px; padding:42px 44px; box-shadow: 0 30px 80px rgba(0,0,0,.5); }

  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; margin:0 0 10px; }
  .lead { font-size:14px; color:var(--text-dim); line-height:1.65; margin:0 0 24px; }
  .lead b { color:var(--text); }

  .email-row { display:flex; align-items:center; justify-content:center; gap:8px; padding:11px 16px; background:rgba(99,102,241,.08); border:1px solid rgba(99,102,241,.3); border-radius:10px; font-size:13px; margin-bottom:24px; }
  .email-row svg { color:#A78BFA; }
  .email-row b { color:#C7D2FE; }

  .btn-row { display:flex; gap:10px; margin-bottom:18px; }
  .btn { padding:13px 18px; border-radius:10px; font-size:13.5px; font-weight:600; transition:all 150ms; display:flex; align-items:center; justify-content:center; gap:8px; flex:1; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; box-shadow:0 8px 26px rgba(99,102,241,.35); }
  .btn-primary:hover { transform:translateY(-1px); }
  .btn-ghost { background:transparent; border:1px solid var(--line-strong); color:var(--text-dim); }

  .resend { font-size:12.5px; color:var(--text-dim); margin-top:8px; padding:12px 14px; background:rgba(15,23,42,.5); border:1px solid var(--line); border-radius:9px; display:flex; align-items:center; justify-content:space-between; }
  .resend a { color:#A78BFA; font-weight:600; }
  .resend a.disabled { color:var(--text-muted); pointer-events:none; }

  /* Setup checklist (what they can do while waiting) */
  .next-steps { margin-top:26px; }
  .ns-h { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; font-weight:700; text-align:left; margin-bottom:10px; }
  .ns-list { display:flex; flex-direction:column; gap:8px; }
  .ns-item { display:grid; grid-template-columns: 32px 1fr auto; gap:12px; align-items:center; padding:11px 14px; background:rgba(15,23,42,.5); border:1px solid var(--line); border-radius:10px; text-align:left; }
  .ns-item:hover { background:rgba(99,102,241,.08); border-color:rgba(99,102,241,.3); }
  .ns-item .ic { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .ns-item .ic.p { background:rgba(99,102,241,.18); color:#A78BFA; }
  .ns-item .ic.c { background:rgba(34,211,238,.18); color:#67E8F9; }
  .ns-item .ic.a { background:rgba(245,158,11,.18); color:#FCD34D; }
  .ns-item .t { font-size:13px; font-weight:600; }
  .ns-item .d { font-size:11px; color:var(--text-dim); }
  .ns-item .arrow { color:var(--text-muted); }

  .alt-link { font-size:12.5px; color:var(--text-muted); margin-top:24px; }
  .alt-link a { color:#A78BFA; font-weight:600; }

  .footer { position:absolute; bottom:30px; left:0; right:0; display:flex; justify-content:center; gap:18px; font-size:11.5px; color:var(--text-muted); z-index:2; }
  .footer a { color:var(--text-muted); }
</style>
</head>
<body>
<div class="page">

  <div class="topnav">
    <div class="brand">
      <div class="mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="9" cy="10" r="2.4" fill="#fff"/><circle cx="15" cy="10" r="2.4" fill="#fff"/>
        <circle cx="9" cy="10" r="1" fill="#0B1220"/><circle cx="15" cy="10" r="1" fill="#0B1220"/>
        <path d="M11 14.5 L12 16 L13 14.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg></div>
      <div><div class="name">ChatOwl</div><div class="sub">B2B 接案媒合</div></div>
    </div>
    <div class="help">需要協助？<a href="Help.html" style="color:#A78BFA; font-weight:600;">前往幫助中心</a></div>
  </div>

  <!-- particles -->
  <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div>

  <div class="stack">
    <div class="illust">
      <div class="ring"></div>
      <div class="ring2"></div>
      <div class="pulse"></div>
      <div class="center">
        <div class="env">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 7 9-7"/></svg>
        </div>
      </div>
      <div class="check">
        <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="#10B981" stroke="#0B1220" stroke-width="3"/><path d="m10 16 4 4 8-8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="card">
      <h1>啟用您的 ChatOwl 帳號</h1>
      <p class="lead">為了確認這個信箱屬於您，我們已將啟用連結發送到</p>

      <div class="email-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 7 9-7"/></svg>
        <b>chen@singularity.tw</b>
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost">我要更換信箱</button>
        <button class="btn btn-primary">開啟 Gmail →</button>
      </div>

      <div class="resend">
        <span>沒收到啟用信？檢查垃圾郵件夾</span>
        <span><a class="disabled">重新發送</a> <span style="color:var(--text-muted);">(00:38)</span></span>
      </div>

      <div class="next-steps">
        <div class="ns-h">啟用前可以先做的事</div>
        <div class="ns-list">
          <a class="ns-item" href="Company.html">
            <div class="ic p"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14"/></svg></div>
            <div><div class="t">完善公司檔案</div><div class="d">上傳 LOGO、補充能力描述（提升媒合率 +35%）</div></div>
            <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </a>
          <a class="ns-item" href="Discover.html">
            <div class="ic c"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
            <div><div class="t">瀏覽企業生態圈</div><div class="d">先看看其他公司，啟用後可立即發起連結</div></div>
            <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </a>
          <a class="ns-item" href="Settings.html">
            <div class="ic a"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
            <div><div class="t">邀請團隊成員</div><div class="d">先送出邀請，他們會在您完成啟用後同步收到</div></div>
            <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </a>
        </div>
      </div>
    </div>

    <div class="alt-link">輸錯信箱了？<a>返回上一步</a> · 或 <a href="Login.html">直接登入</a></div>
  </div>

  <div class="footer">
    <a href="#">服務條款</a><a href="#">隱私政策</a><a href="#">資安公告</a>
    <span>© 2026 ChatOwl Inc.</span>
  </div>

</div>
</body>
</html>
