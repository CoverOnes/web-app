<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>ChatOwl — 404 找不到頁面</title>
<meta name="viewport" content="width=1440,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#060A14; --bg-3:#0F172A; --line:rgba(148,163,184,.12); --line-strong:rgba(148,163,184,.2); --text:#E5E7EB; --text-dim:#94A3B8; --text-muted:#64748B; --accent:#6366F1; --accent-2:#8B5CF6; --cyan:#22D3EE; --green:#10B981; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; background:#000; color:var(--text); font-family:'Inter','Noto Sans TC',sans-serif; -webkit-font-smoothing:antialiased; }
  button, a { font:inherit; color:inherit; cursor:pointer; text-decoration:none; }
  .page { width:1440px; min-height:1024px; background: radial-gradient(1100px 700px at 50% 30%, rgba(99,102,241,.18), transparent 60%), radial-gradient(900px 600px at 50% 90%, rgba(34,211,238,.08), transparent 60%), var(--bg); position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .page::before { content:""; position:absolute; inset:0; background-image: linear-gradient(rgba(148,163,184,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.04) 1px, transparent 1px); background-size:64px 64px; mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%); }
  .topnav { position:absolute; top:30px; left:0; right:0; display:flex; justify-content:space-between; padding:0 56px; z-index:5; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .mark { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 24px rgba(99,102,241,.4); }
  .brand .name { font-size:18px; font-weight:800; letter-spacing:-.02em; }
  .brand .sub { font-size:11px; color:var(--text-dim); }
  .topnav a { font-size:13px; color:var(--text-dim); padding:8px 14px; border-radius:8px; }
  .topnav a:hover { background:rgba(255,255,255,.04); color:var(--text); }

  .stack { width:100%; max-width:760px; text-align:center; position:relative; z-index:2; padding:0 40px; }

  /* Big 404 with broken-link mascot */
  .nums { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:28px; }
  .nums .d { font-size:200px; font-weight:900; letter-spacing:-.06em; line-height:1; background: linear-gradient(180deg, #6366F1 0%, #8B5CF6 50%, #312E81 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .nums .owl { width:180px; height:180px; position:relative; }
  .nums .owl svg { width:100%; height:100%; }
  .nums .owl::after { content:"?"; position:absolute; top:-6px; right:14px; font-size:36px; font-weight:800; color:#FCD34D; text-shadow:0 0 16px rgba(252,211,77,.5); animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }

  h1 { font-size:34px; font-weight:800; letter-spacing:-.025em; margin:0 0 12px; }
  .lead { font-size:15px; color:var(--text-dim); line-height:1.65; max-width:520px; margin:0 auto 28px; }
  .lead code { font-family:'Menlo',monospace; padding:2px 8px; background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.3); border-radius:6px; color:#A78BFA; font-size:13px; }

  .cta { display:flex; gap:12px; justify-content:center; margin-bottom:36px; }
  .btn { padding:13px 22px; border-radius:10px; font-size:13.5px; font-weight:600; display:inline-flex; align-items:center; gap:8px; transition:all 150ms; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; box-shadow:0 8px 26px rgba(99,102,241,.35); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 12px 30px rgba(99,102,241,.45); }
  .btn-ghost { background:transparent; border:1px solid var(--line-strong); color:var(--text-dim); }
  .btn-ghost:hover { background:rgba(255,255,255,.04); color:var(--text); }

  /* Suggested links */
  .sugg-h { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; font-weight:700; margin-bottom:14px; }
  .sugg { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:680px; margin:0 auto; }
  .sg { background:rgba(15,23,42,.6); backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:12px; padding:16px; text-align:left; transition:all 150ms; }
  .sg:hover { border-color:rgba(99,102,241,.4); background:rgba(99,102,241,.06); transform:translateY(-2px); }
  .sg .ic { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
  .sg .ic.p { background:rgba(99,102,241,.18); color:#A78BFA; }
  .sg .ic.c { background:rgba(34,211,238,.18); color:#67E8F9; }
  .sg .ic.g { background:rgba(16,185,129,.18); color:#6EE7B7; }
  .sg .t { font-size:13.5px; font-weight:700; }
  .sg .d { font-size:11.5px; color:var(--text-dim); margin-top:3px; line-height:1.5; }

  /* search bar */
  .search { display:flex; align-items:center; gap:10px; padding:13px 16px; background:rgba(15,23,42,.7); border:1px solid var(--line-strong); border-radius:12px; max-width:480px; margin:0 auto 28px; }
  .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 4px rgba(99,102,241,.15); }
  .search svg { color:var(--text-muted); }
  .search input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font:inherit; font-size:14px; }
  .search input::placeholder { color:var(--text-muted); }
  .search .kbd { padding:3px 7px; border-radius:5px; background:var(--bg-3); border:1px solid var(--line); font-size:10.5px; color:var(--text-muted); font-family:'Menlo',monospace; }

  .footer { position:absolute; bottom:30px; left:0; right:0; display:flex; justify-content:center; gap:18px; font-size:11.5px; color:var(--text-muted); z-index:2; }
  .footer a { color:var(--text-muted); }
</style>
</head>
